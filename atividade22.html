<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <style>
        .form-boot-1 {
            width: 550px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="w-100 d-flex justify-content-center align-items-center vh-100">
        <div class="form-boot-1 bg-secondary-subtle h-75 p-4 rounded-3">
            <div class="d-flex justify-content-center flex-column p-0 w-100 h-100">
                <div class="w-100 d-flex justify-content-center m-0">
                    <img class="w-25"
                        src="https://download.logo.wine/logo/Bootstrap_(front-end_framework)/Bootstrap_(front-end_framework)-Logo.wine.png"
                        alt="" srcset="">
                </div>
                <h2 class="text-center">Floating Labels</h2>
                <p class="text-center">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ratione qui beatae vel
                    eaque, <a href="">sapiente
                        sunt ex reiciendis? Vitae exercitationem saepe</a></p>
                <div class="d-inline-block">
                    <div class="d-flex justify-content-center">
                        <div class="mb-3 w-75">
                            <input type="email" class="form-control p-3"  id="exampleFormControlInput1"
                                placeholder="Email address">
                        </div>
                    </div>
                    <div class="d-flex justify-content-center">
                        <div class="mb-3 w-75">
                            <input type="password" name="exampleFormControlPassword" class="form-control p-3"
                                id="exampleFormControlInput1" placeholder="Password">
                        </div>
                    </div>
                    <div class="d-flex justify-content-left">
                        <div class="form-check w-50 d-flex justify-content-center">
                            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                            <label class="form-check-label" for="checkDefault">
                                Remember me
                            </label>
                        </div>
                    </div>
                </div>
                <div class="btn-1 d-flex justify-content-center">
                    <div class="d-grid gap-2 w-75 m-2">
                        <button class="btn btn-primary p-3" type="button">Sign in</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
